<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Max Humber{% endblock %}</title>
    <meta name="description" content="{{ description }}">
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:type" content="{{ og_type }}">
    <meta property="og:url" content="{{ url }}">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="{{ url }}">
    <link rel="stylesheet" href="/static/highlight.css">
    <link rel="stylesheet" href="/static/style.css">
    {% block feeds %}
    {% for tag in tags %}
    <link rel="alternate" type="application/rss+xml" title="#{{ tag }}" href="/feed/{{ tag }}.xml">
    {% endfor %}
    {% endblock %}
    <script defer src="https://cloud.umami.is/script.js" data-website-id="49865e68-5a7e-4e56-9ff3-4f1719b00f03" data-domains="maxhumber.com" data-do-not-track="true"></script>
</head>
<body>
    <header>
        <nav aria-label="Site">
            <a href="/">
                <picture>
                    <source media="(prefers-color-scheme: dark)" srcset="/static/signature-dark.png">
                    <img src="/static/signature.png" alt="Max Humber">
                </picture>
            </a>
            <ul>
                <li><a href="https://bracket.ltd/">Apps</a></li>
                <li><a href="https://github.com/maxhumber">GitHub</a></li>
                <li><a href="https://linkedin.com/in/maxhumber">LinkedIn</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
